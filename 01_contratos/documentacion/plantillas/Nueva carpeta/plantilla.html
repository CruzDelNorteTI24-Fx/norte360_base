<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Documento generado</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; }
    h2   { color: #2c3e50; }
    p    { font-size: 14px; line-height: 1.4; }
    .campo { margin-bottom: 12px; }
    .campo strong { display: inline-block; width: 150px; }
    .obs   { white-space: pre-wrap; }
    .fecha { margin-top: 20px; font-style: italic; font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <h2>Documento de {{tipo_documento}}</h2>
  <div class="campo"><strong>ID Trabajador:</strong> {{idtrabajador}}</div>
  <div class="campo"><strong>Nombre:</strong> {{nombre}}</div>
  <div class="campo"><strong>DNI:</strong> {{dni}}</div>
  <div class="campo"><strong>Observaciones:</strong>
    <div class="obs">{{observaciones}}</div>
  </div>
  <div class="fecha">Generado el {{fecha}}</div>
</body>
</html>
